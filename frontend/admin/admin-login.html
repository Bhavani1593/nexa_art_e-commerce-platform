<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Nexa Art</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form { max-width: 300px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 10px; font-size: 16px; background: #8b5cf6; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🔒 Admin Login</h2>
  <form id="adminLoginForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:5000/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('admin_token', data.token);
          alert('✅ Login successful!');
          window.location.href = 'add-product.html'; // Or wherever admin should land
        } else {
          alert('❌ ' + (data.message || 'Login failed'));
        }
      } catch (err) {
        console.error(err);
        alert('⚠️ Server error');
      }
    });
  </script>
</body>
</html>
