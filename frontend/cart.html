<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Cart | Nexa Art</title>
  <link rel="stylesheet" href="cart.css" />
</head>
<body>

  <header>
    <h1>🛒 Your Cart</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" class="active">Cart</a>
    </nav>
  </header>

  <main>
    <div class="cart-container" id="cart-container">
      <!-- Cart items will be shown here -->
    </div>
    <div id="cart-items"></div>
      <h3 id="total"></h3>
    </div>
    <div style="text-align: center; margin: 20px;">
      <a href="checkout.html">
        <button style="padding: 10px 20px; font-size: 16px;">Proceed to Checkout</button>
      </a>
    </div>
  </main>

  <script>
    const cartContainer = document.getElementById("cart-container");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
    function renderCart() {
      if (cart.length === 0) {
        cartContainer.innerHTML = "<p>Your cart is empty.</p>";
        return;
      }
  
      let total = 0;
      cartContainer.innerHTML = "<h2>Items in your cart:</h2>" + cart.map((item, index) => {
        total += item.price;
        return `<div class="item">
                  <p>${item.name}</p>
                  <p>₹${item.price}</p>
                  <button onclick="removeFromCart(${index})">Remove</button>
                </div>`;
      }).join("") + `<h3>Total: ₹${total}</h3>`;
    }
  
    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    }
  
    renderCart();
  </script>
  

</body>
</html>
